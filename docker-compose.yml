version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: suncarban
      POSTGRES_USER: suncarban
      POSTGRES_PASSWORD: suncarban
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  chroma:
    image: chromadb/chroma:0.5.17
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://suncarban:suncarban@postgres:5432/suncarban
      SECRET_KEY: change-me
    depends_on:
      - postgres
      - chroma
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  chroma_data:
